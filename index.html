<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepto</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/zepto-logo.webp" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- $Navbar -->
    <nav>
        <section id="nav1">
            <aside id="logo-address">
                <div id="logo">
                    Z
                </div>
                <div id="address">
                    <p>Delivery in <span>10 mins</span></p>
                    <p id="location"><i class="fa-solid fa-location-dot"></i>Select Address</p>
                </div>
            </aside>
            <aside id="links">
                <a href="#" class="active">Home</a>
                <a href="./product.html">Product</a>
            </aside>
            <aside id="user-cart">
                <i class="fa-regular fa-user"></i>
                <i class="fa-solid fa-cart-shopping"></i>
            </aside>
        </section>
    </nav>
    <!-- $Header -->
    <header>
        <div id="banner-container">
            <img src="./assets/banner-1.jpeg" alt="Banner1">
            <img src="./assets/Banner-2.jpeg" alt="Banner2">
            <img src="./assets/banner-1.jpeg" alt="Banner3">
        </div>
    </header>
    <!-- $Category -->
     <section id="category">
        <aside id="category-title">
            <h2>Shop by Category</h2>
        </aside>
        <aside id="category-items">
        </aside>   
     </section>
     <!-- $Highlights -->
    <section id="highlights">
        <div id="highlights-container" class="one">
            <p class="highlights-icon">🚴</p>
            <p class="highlights-title">Free Delivery</p>
            <p class="highlights-description">On order above ₹149/-</p>
        </div>
        <div id="highlights-container" class="two">
            <p class="highlights-icon ">⚡</p>
            <p class="highlights-title">10 mins delivery</p>
            <p class="highlights-description">Lightening fast</p>
        </div>
        <div id="highlights-container" class="three">
            <p class="highlights-icon">💸</p>
            <p class="highlights-title">Best Prices</p>
            <p class="highlights-description">Directly from forms</p>
        </div>
        <div id="highlights-container" class="four">
            <p class="highlights-icon">🛍️</p>
            <p class="highlights-title">Wide assotments</p>
            <p class="highlights-description">5000+ products</p>
        </div>
    </section>
    <!-- $Footer -->
     <footer>
        <h2>Zepto</h2>
    <p>&copy; 2026 | 10 Minutes Delivery<p>
    <p>194 products across 24 categories.</p>
     </footer>
    <script src="./script.js"></script>
</body>
</html>
